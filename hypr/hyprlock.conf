# /* ---- 💫 https://github.com/LinuxBeginnings 💫 ---- */  #
# Hyprlock config for => 2k monitor resolutions                                                         
# Original config submitted by https://github.com/SherLock707

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    # NOTE: use only 1 path
	#path = screenshot   # screenshot of your desktop
	#path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_modified # by wallpaper effects
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current # current wallpaper
    
    color = rgb(0,0,0) # color will be rendered initially until path is available

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 3
    blur_passes = 2 # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%I") </big></b>"
    color = rgba(38d67fff)
    font_size = 148
    font_family = SF Mono
    shadow_passes = 0
    shadow_size = 0

    position = 0, -180
    halign = center
    valign = top
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgba(38d67fff)
    font_size = 148
    font_family = SF Mono
    shadow_passes = 0
    shadow_size = 0

    position = 0, -350
    halign = center
    valign = top
}

# Today
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> "$(date +'%A')" </big></b>"
    color = rgba(38d67fff)
    font_size = 18
    font_family = JetBrainsMono NFM

    position = 0, 150
    halign = center
    valign = center
}

# Week
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%d %b')" </b>"
    color = rgba(38d67fff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font 10

    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 65
    outline_thickness = 4

    dots_size = 0.32 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.64 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rouding = -1

    rounding = 32
    outer_color = rgba(38d67fff)
    inner_color = rgba(190, 209, 199, 0.1)
    font_color = $secondary
    fade_on_empty = true
    placeholder_text = <i></i> # Text rendered in the input box when it's empty.

    position = 0, 200
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $color8
    font_size = 32
    font_family = SF Mono Light
    position = 0, 0
    halign = center
    valign = bottom
}

